source=./catppuccin.conf

$mainMod = SUPER
$shiftMod = SUPER SHIFT
$ctrlMod = SUPER CTRL
$altMod = SUPER ALT
$mehMod = CTRL SHIFT ALT
$hyprMod = SUPER SHIFT CTRL ALT
$terminal = ghostty
$emacs = emacsclient -c
$webBrowser = vivaldi --disable-gpu
$bitwarden = bitwarden
$chrome = googel-chrome-stable --disable-gpu
$menu = rofi -show drun
$discord = vesktop
$nxim = ghostty --title="nximw" -e nvim
$rcnxim = ghostty --title="rcnximw" -e rc

$scale = 1;
monitorv2 {
  output = eDP-1
  mode = preferred
  position = 0x0
  scale = 1
}

monitorv2 {
  output = desc:LG Electronics LG ULTRAGEAR 304NTVS0A895
  mode = 2560x1440@59.95
  position = auto-up
  scale = 1
  # mirror = eDP-1
}

exec-once = $terminal
exec-once = $bitwarden
exec-once = waybar
#exec-once "dropbox start"

general {
  gaps_in = 5
  gaps_out = 3
  border_size = 3
  col.active_border = $lavender $peach 30deg
  col.inactive_border = $crust
  layout = scrolling
}

decoration {
  shadow  {
    enabled = false
    offset = 0 5
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.9
}

animations {
  enabled = true
}

dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_status = "master"
}

scrolling {

}

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
}

input {
  kb_layout = us
  # https://discourse.nixos.org/t/how-to-fix-f13-f24-keys/48847/8
  kb_options = fkeys:basic_13-24
  follow_mouse = 1
  sensitivity = 0 # -1.0 ~ 1.0, 0는 기본값
  touchpad {
    natural_scroll = false
  }
}

windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0
  windowrule = pseudo on, match:class fcitx
  windowrule = suppress_event maximize, match:class .*
  # windowrule = workspace name:Emacs, match:class ^(emacs).*$
  windowrule = workspace name:Main, match:initial_title Ghostty
  windowrule = workspace special:Discord, match:class vesktop
  windowrule = workspace special:SNS, pseudo on, match:initial_title Telegram
  windowrule = workspace special:Bitwarden, match:class [Bb]itwarden
  #windowrule = workspace name:WWW, match:class [Vv]ivaldi.*
#  windowrule = workspace special:Nxim, match:initial_title nximw
#  windowrule = workspace special:RcNxim, match:initial_title rcnximw

bind = $mainMod, C, killactive
bind = $mainMod, F, togglefloating

# Moving around windows
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u

# also with vim bindings
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $shiftMod, k, movewindow, mon:u
bind = $shiftMod, j, movewindow, mon:d
bind = $ctrlMod, up, movecurrentworkspacetomonitor, u
bind = $ctrlMod, k, movecurrentworkspacetomonitor, u
bind = $ctrlMod, down, movecurrentworkspacetomonitor, d
bind = $ctrlMod, j, movecurrentworkspacetomonitor, d

bind = $mainMod, comma, layoutmsg, swapcol l
bind = $shiftMod, h, layoutmsg, swapcol l
bind = $shiftMod, left, layoutmsg, swapcol l

bind = $mainMod, period, layoutmsg, swapcol r
bind = $shiftMod, l, layoutmsg, swapcol r
bind = $shiftMod, right, layoutmsg, swapcol r

bind = $mehMod, r, submap, resize
bind = $mehMod, e, submap, resize
submap = resize
bind = , left, layoutmsg, colresize -conf
bind = , h, layoutmsg, colresize -conf
bind = , right, layoutmsg, colresize +conf
bind = , l, layoutmsg, colresize +conf
bind = , escape, submap, reset
bind = , f, layoutmsg, fit active
bind = , f, submap, reset
bind = , a, layoutmsg, fit all
bind = , catchall, submap, reset
submap = reset

bind = $mainMod, 1, workspace, 1
bind = $shiftMod, 1, movetoworkspace, 1
bind = $mainMod, 2, workspace, 2
bind = $shiftMod, 2, movetoworkspace, 2
bind = $mainMod, 3, workspace, 3
bind = $shiftMod, 3, movetoworkspace, 3
bind = $mainMod, 4, workspace, 4
bind = $shiftMod, 4, movetoworkspace, 4
bind = $mainMod, 5, workspace, 5
bind = $shiftMod, 5, movetoworkspace, 5
bind = $mainMod, 6, workspace, 6
bind = $shiftMod, 6, movetoworkspace, 6
bind = $mainMod, 7, workspace, 7
bind = $shiftMod, 7, movetoworkspace, 7
bind = $mainMod, 8, workspace, 8
bind = $shiftMod, 8, movetoworkspace, 8
bind = $mainMod, 9, workspace, 9
bind = $shiftMod, 9, movetoworkspace, 9
bind = $mainMod, m, workspace, name:Main
bind = $shiftMod, m, movetoworkspace, name:Main

bind = $mainMod, SPACE, exec, $menu

bind = ALT, SPACE, submap, leader

submap = leader
bind = , r, submap, resize
bind = , catchall, submap, reset
submap = reset

bind = $mainMod, B, exec, hyprctl clients | grep "class: vivaldi-stable" && hyprctl dispatch focuswindow class:vivaldi-stable || $webBrowser
bind = $ctrlMod, B, exec, $webBrowser
# bind = $shiftMod, B, movetoworkspace, name:WWW

bind = $mainMod, D, exec, hyprctl clients | grep -q "class: vesktop" && hyprctl dispatch togglespecialworkspace Discord || $discord
bind = $ctrlMod, D, exec, $discord
bind = $shiftMod, D, movetoworkspace, special:Discord

bind = $mainMod, S, exec, hyprctl clients | grep -q "initialTitle: Telegram" && hyprctl dispatch togglespecialworkspace SNS || Telegram
bind = $ctrlMod, S, exec, Telegram
bind = $shiftMod, S, movetoworkspace, special:SNS

# terminal
  bind = $mainMod, T, exec, hyprctl clients | grep -q "initialTitle: Ghostty" && hyprctl dispatch focuswindow initialtitle:Ghostty || $terminal
  bind = $ctrlMod, T, exec, $terminal
#  bind = $shiftMod, T, movetoworkspace, name:Term

bind = $mainMod, E, exec, hyprctl clients | grep -q "initialClass: emacs" && hyprctl dispatch focuswindow initialclass:emacs || $emacs
bind = $ctrlMod, E, exec, $emacs
# bind = $shiftMod, E, movetoworkspace, name:Emacs

bind = $mainMod, n, exec, hyprctl clients | grep -q "initialTitle: nximw" && hyprctl dispatch focuswindow initialtitle:nximw || $nxim

bind = $mainMod, r, exec, hyprctl clients | grep -q "initialTitle: rcnximw" && hyprctl dispatch focuswindow initialtitle:rcnximw || $rcnxim

bind = $mainMod, W, togglespecialworkspace, Bitwarden
bind = $ctrlMod, W, exec, $bitwarden
bind = $shiftMod, W, movetoworkspace, special:Bitwarden

# audio control, refer to submaps below
bind = $ctrlMod SHIFT, A, submap, audio
submap = audio, reset
bind = , l, exec, pactl set-sink-port 0 analog-output-lineout
bind = , h, exec, pactl set-sink-port 0 analog-output-headphones
bind = , p, exec, pwvucontrol
bind = , catchall, submap, reset
submap = reset

bind = , F22, exec, fcitx5-remote -s hangul
bind = , F21, exec, fcitx5-remote -c
bind = , F20, exec, fcitx5-remote -s mozc

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
